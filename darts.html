<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Darts</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --paper: #fdfcf8;
    --ink: #1a1a18;
    --ink-light: #6b6b65;
    --ink-faint: #d4d2cc;
    --accent: #1a1a18;
    --rule: #e0ddd6;
    /* Score color coding */
    --finish: #2d6a2d;
    --finish-bg: #edf7ed;
    --bogey: #8b1a1a;
    --bogey-bg: #fdf0f0;
    --caution: #7a5c00;
    --caution-bg: #fdf8ec;
    --bust: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 2rem;
  }

  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    text-align: center;
  }

  .setup-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    width: 100%;
    max-width: 480px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .setup-section label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.5rem;
  }

  .setup-section input[type="text"] {
    width: 100%;
    border: 1px solid var(--rule);
    background: var(--bg);
    padding: 0.6rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .setup-section input[type="text"]:focus { border-color: var(--ink); }

  .pill-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .pill {
    padding: 0.4rem 1rem;
    border: 1px solid var(--rule);
    background: var(--bg);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    transition: all 0.12s;
  }
  .pill.active, .pill:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .setup-btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 0.9rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.12s;
  }
  .setup-btn:hover { opacity: 0.8; }

  /* ── GAME SCREEN ── */
  #game-screen { display: none; flex-direction: column; min-height: 100vh; }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }

  .game-header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .header-actions { display: flex; gap: 0.5rem; }

  .hdr-btn {
    background: none;
    border: 1px solid var(--rule);
    padding: 0.3rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.12s;
  }
  .hdr-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* ── SCOREBOARDS ── */
  .scoreboards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 2px solid var(--ink);
  }

  .player-board {
    padding: 1rem;
    background: var(--paper);
    position: relative;
    transition: background 0.15s;
  }
  .player-board:first-child { border-right: 1px solid var(--rule); }
  .player-board.active { background: var(--bg); }
  .player-board.active::after {
    content: '▶';
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    font-size: 10px;
    color: var(--ink-light);
  }

  .player-name {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-score {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
    transition: color 0.2s;
  }

  .score-finish { color: var(--finish); }
  .score-bogey  { color: var(--bogey); }
  .score-caution { color: var(--caution); }
  .score-bust   { color: var(--bust); }

  .score-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.2rem;
    height: 14px;
  }
  .tag-finish { color: var(--finish); }
  .tag-bogey  { color: var(--bogey); }
  .tag-caution { color: var(--caution); }

  .player-stats-mini {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
    font-size: 11px;
    color: var(--ink-light);
  }

  .player-legs {
    margin-top: 0.3rem;
    font-size: 11px;
    color: var(--ink-light);
  }

  /* ── CHECKOUT HINT ── */
  .checkout-hint {
    padding: 0.6rem 1rem;
    background: var(--finish-bg);
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
    color: var(--finish);
    min-height: 32px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .checkout-hint.hidden { display: none; }
  .checkout-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 0.75rem 1rem;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .score-display {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    min-width: 80px;
    text-align: center;
    letter-spacing: -0.02em;
    border-bottom: 2px solid var(--ink);
    padding: 0 0.3rem;
    line-height: 1.2;
    color: var(--ink);
  }
  .score-display.invalid { color: var(--bust); border-color: var(--bust); }

  .dart-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dart-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid var(--ink-faint);
    background: none;
  }
  .dart-dot.filled { background: var(--ink); border-color: var(--ink); }

  .input-sub {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.4rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .mode-toggle {
    font-size: 11px;
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--rule);
    background: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    color: var(--ink-light);
    transition: all 0.12s;
  }
  .mode-toggle.active { border-color: var(--ink); color: var(--ink); background: var(--ink-faint); }

  .remaining-label {
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
  }

  /* ── NUMPAD ── */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    flex: 1;
  }

  .np-btn {
    background: var(--paper);
    border: none;
    padding: 1rem 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.08s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .np-btn:active, .np-btn:hover { background: var(--bg); }
  .np-btn.enter { background: var(--ink); color: var(--bg); font-size: 0.85rem; letter-spacing: 0.05em; }
  .np-btn.enter:hover { background: #333; }
  .np-btn.del { font-size: 1rem; }
  .np-btn.span2 { grid-column: span 2; }

  /* ── QUICK SCORES (F-keys on desktop) ── */
  .quick-scores {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: var(--rule);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .qs-btn {
    background: var(--paper);
    border: none;
    padding: 0.5rem 0.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.08s;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
    line-height: 1.3;
    user-select: none;
  }
  .qs-btn:hover { background: var(--bg); }
  .qs-btn:active { background: var(--ink-faint); }
  .qs-key {
    display: block;
    font-size: 9px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
  }

  /* ── GAME LOG ── */
  .game-log {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .log-entry {
    display: grid;
    grid-template-columns: 4rem 1fr 1fr;
    gap: 0.5rem;
    font-size: 12px;
    padding: 0.25rem 0;
    border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-round { color: var(--ink-light); font-size: 11px; }
  .log-score { font-weight: 500; }
  .log-remain { color: var(--ink-light); }
  .log-p2 { text-align: right; }
  .log-header {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    border-bottom: 2px solid var(--rule) !important;
    padding-bottom: 0.4rem !important;
  }

  /* ── STATS SCREEN ── */
  #stats-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    background: var(--bg);
  }

  .stats-header {
    padding: 1rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stats-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .stats-body { padding: 1rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .stats-player-section { background: var(--paper); border: 1px solid var(--rule); padding: 1rem; }

  .stats-player-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .stat-item {}
  .stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; line-height: 1.2; }

  .history-section { background: var(--paper); border: 1px solid var(--rule); padding: 1rem; }
  .history-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.5rem; }
  .history-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 300px; overflow-y: auto; }
  .history-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--rule);
  }
  .history-item:last-child { border-bottom: none; }
  .history-winner { font-weight: 500; }
  .history-score { color: var(--ink-light); }

  /* ── LEG WIN OVERLAY ── */
  .leg-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,24,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
  }
  .leg-overlay.show { display: flex; }

  .leg-overlay-card {
    background: var(--paper);
    padding: 2.5rem;
    text-align: center;
    max-width: 320px;
    width: 90%;
    border: 2px solid var(--ink);
  }

  .leg-winner-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .leg-winner-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    line-height: 1.1;
    margin: 0.3rem 0;
  }

  .leg-checkout { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .leg-avg { font-size: 12px; color: var(--ink-light); margin-bottom: 1.5rem; }

  .leg-btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 0.5rem;
  }

  .leg-btn-sec {
    background: none;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 0.75rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 400px) {
    .np-btn { padding: 0.8rem 0.3rem; font-size: 1rem; }
    .qs-btn { font-size: 11px; padding: 0.4rem 0.1rem; }
    .quick-scores { grid-template-columns: repeat(4, 1fr); }
  }

  @media (min-width: 600px) {
    #game-screen { max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
    #stats-screen { max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
  }
</style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setup-screen">
  <div class="setup-title">Darts</div>

  <div class="setup-card">
    <div class="setup-section">
      <label>Player 1</label>
      <input type="text" id="p1-name" value="Player 1" maxlength="20">
    </div>
    <div class="setup-section">
      <label>Player 2</label>
      <input type="text" id="p2-name" value="Player 2" maxlength="20">
    </div>
    <div class="setup-section">
      <label>Starting Score</label>
      <div class="pill-group" id="start-score-group">
        <button class="pill" data-val="301">301</button>
        <button class="pill active" data-val="501">501</button>
        <button class="pill" data-val="701">701</button>
      </div>
    </div>
    <div class="setup-section">
      <label>Out Rule</label>
      <div class="pill-group" id="out-rule-group">
        <button class="pill active" data-val="double">Double out</button>
        <button class="pill" data-val="single">Single out</button>
      </div>
    </div>
    <div class="setup-section">
      <label>Legs to win (per set)</label>
      <div class="pill-group" id="legs-group">
        <button class="pill active" data-val="1">1</button>
        <button class="pill" data-val="3">3</button>
        <button class="pill" data-val="5">5</button>
        <button class="pill" data-val="7">7</button>
      </div>
    </div>
    <div class="setup-section">
      <label>Sets to win</label>
      <div class="pill-group" id="sets-group">
        <button class="pill active" data-val="1">1</button>
        <button class="pill" data-val="3">3</button>
        <button class="pill" data-val="5">5</button>
        <button class="pill" data-val="7">7</button>
      </div>
    </div>
    <button class="setup-btn" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="game-screen">
  <div class="game-header">
    <div class="game-header-title">Darts</div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="showStats()">Stats</button>
      <button class="hdr-btn" onclick="undoLast()">Undo</button>
      <button class="hdr-btn" onclick="newGame()">New</button>
    </div>
  </div>

  <!-- Scoreboards -->
  <div class="scoreboards">
    <div class="player-board active" id="board-0">
      <div class="player-name" id="name-0">P1</div>
      <div class="player-score" id="score-0">501</div>
      <div class="score-tag" id="tag-0"></div>
      <div class="player-stats-mini" id="mini-0">
        <span id="avg-0">avg —</span>
        <span id="legs-0">legs 0</span>
      </div>
    </div>
    <div class="player-board" id="board-1">
      <div class="player-name" id="name-1">P2</div>
      <div class="player-score" id="score-1">501</div>
      <div class="score-tag" id="tag-1"></div>
      <div class="player-stats-mini" id="mini-1">
        <span id="avg-1">avg —</span>
        <span id="legs-1">legs 0</span>
      </div>
    </div>
  </div>

  <!-- Checkout hint -->
  <div class="checkout-hint hidden" id="checkout-hint">
    <span class="checkout-label">Finish</span>
    <span id="checkout-text"></span>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <div>
        <div class="dart-dots" id="dart-dots">
          <div class="dart-dot" id="dot-0"></div>
          <div class="dart-dot" id="dot-1"></div>
          <div class="dart-dot" id="dot-2"></div>
        </div>
      </div>
      <div class="score-display" id="score-display">_</div>
      <div style="margin-left:auto; display:flex; flex-direction:column; gap:4px; align-items:flex-end;">
        <button class="mode-toggle" id="mode-btn" onclick="toggleMode()" title="Toggle input mode">3-dart score</button>
        <span class="remaining-label" id="remaining-label"></span>
      </div>
    </div>
  </div>

  <!-- Quick scores (common numbers, F1-F12) -->
  <div class="quick-scores" id="quick-scores"></div>

  <!-- Numpad -->
  <div class="numpad">
    <button class="np-btn" onclick="numpadInput('1')">1</button>
    <button class="np-btn" onclick="numpadInput('2')">2</button>
    <button class="np-btn" onclick="numpadInput('3')">3</button>
    <button class="np-btn" onclick="numpadInput('4')">4</button>
    <button class="np-btn" onclick="numpadInput('5')">5</button>
    <button class="np-btn" onclick="numpadInput('6')">6</button>
    <button class="np-btn" onclick="numpadInput('7')">7</button>
    <button class="np-btn" onclick="numpadInput('8')">8</button>
    <button class="np-btn" onclick="numpadInput('9')">9</button>
    <button class="np-btn del" onclick="numpadDel()">⌫</button>
    <button class="np-btn" onclick="numpadInput('0')">0</button>
    <button class="np-btn enter" onclick="enterScore()">ENTER</button>
  </div>

  <!-- Log -->
  <div class="game-log" id="game-log">
    <div class="log-entry log-header">
      <span class="log-round">Round</span>
      <span id="log-h-p1">P1</span>
      <span class="log-p2" id="log-h-p2">P2</span>
    </div>
  </div>
</div>

<!-- ══════════════ STATS SCREEN ══════════════ -->
<div id="stats-screen">
  <div class="stats-header">
    <div class="stats-title">Statistics</div>
    <button class="hdr-btn" onclick="hideStats()">← Back</button>
  </div>
  <div class="stats-body" id="stats-body"></div>
</div>

<!-- ══════════════ LEG WIN OVERLAY ══════════════ -->
<div class="leg-overlay" id="leg-overlay">
  <div class="leg-overlay-card">
    <div class="leg-winner-label" id="ov-label">Checkout!</div>
    <div class="leg-winner-name" id="ov-winner"></div>
    <div class="leg-checkout" id="ov-checkout"></div>
    <div class="leg-avg" id="ov-avg"></div>
    <div class="leg-avg" id="ov-score-summary"></div>
    <button class="leg-btn" id="ov-next-btn" onclick="nextLeg()">Next Leg</button>
    <button class="leg-btn-sec" onclick="showStats()">View Stats</button>
  </div>
</div>

<script>
// ══════════════ DATA ══════════════

const CHECKOUTS = {
  170: ["T20 T20 Bull"],
  167: ["T20 T19 Bull"],
  164: ["T20 T18 Bull","T19 T19 Bull"],
  161: ["T20 T17 Bull"],
  160: ["T20 T20 D20"],
  158: ["T20 T20 D19"],
  157: ["T20 T19 D20"],
  156: ["T20 T20 D18"],
  155: ["T20 T19 D19"],
  154: ["T20 T18 D20"],
  153: ["T20 T19 D18"],
  152: ["T20 T20 D16"],
  151: ["T20 T17 D20"],
  150: ["T20 T18 D18","Bull T20 D20"],
  149: ["T20 T19 D16"],
  148: ["T20 T16 D20","T20 T20 D14"],

// Bogey numbers (scores that cannot be checked out with a double)
const BOGEY_NUMBERS = new Set([169,168,166,165,163,162,159]);

// Quick score presets (F1-F12)
const QUICK_SCORES = [26, 41, 45, 60, 81, 85, 100, 121, 140, 141, 180, 0];
const QUICK_LABELS = ["26","41","45","60","81","85","100","121","140","141","180","Miss"];
const FKEY_LABELS  = ["F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12"];

// ══════════════ STATE ══════════════

let G = {
  p1: "Player 1", p2: "Player 2",
  start: 501, outRule: "double", legsToWin: 1, setsToWin: 1,
  current: 0, // 0=P1, 1=P2
  scores: [501, 501],
  legs: [0, 0],
  sets: [0, 0],
  rounds: [], // [{p0: {score, remain}, p1: {score, remain}}]
  currentRound: {0: null, 1: null},
  dartsThrown: [0, 0], // total darts per player this leg
  totalScored: [0, 0], // total score reduction per player this leg
  inputStr: "",
  inputMode: "score", // "score" | "remaining"
  dartsInRound: 0, // 0..2 as darts entered (3-dart total mode)
  history: [], // [{winner, score, p1avg, p2avg}]
  allStats: {"Player 1": createStats(), "Player 2": createStats()},
};

function createStats() {
  return { legs: 0, darts: 0, scored: 0, checkouts: 0, attempts: 0, tons: 0, ton40: 0, ton80: 0, first9scored: 0, first9darts: 0 };
}

// ══════════════ SETUP ══════════════

function pickOption(groupId, val) {
  document.querySelectorAll(`#${groupId} .pill`).forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
}

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.parentElement.id;
    pickOption(group, btn.dataset.val);
  });
});

function getSelected(groupId) {
  return document.querySelector(`#${groupId} .pill.active`)?.dataset.val;
}

function startGame() {
  const p1 = document.getElementById('p1-name').value.trim() || "Player 1";
  const p2 = document.getElementById('p2-name').value.trim() || "Player 2";
  const start = parseInt(getSelected('start-score-group')) || 501;
  const outRule = getSelected('out-rule-group') || "double";
  const legs = parseInt(getSelected('legs-group')) || 1;
  const sets = parseInt(getSelected('sets-group')) || 1;

  G.p1 = p1; G.p2 = p2;
  G.start = start; G.outRule = outRule; G.legsToWin = legs; G.setsToWin = sets;
  G.current = 0;
  G.scores = [start, start];
  G.legs = [0, 0];
  G.sets = [0, 0];
  G.rounds = [];
  G.currentRound = {0: null, 1: null};
  G.dartsThrown = [0, 0];
  G.totalScored = [0, 0];
  G.inputStr = "";
  G.inputMode = "score";
  G.dartsInRound = 0;
  G.history = [];

  if (!G.allStats[p1]) G.allStats[p1] = createStats();
  if (!G.allStats[p2]) G.allStats[p2] = createStats();

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  buildQuickScores();
  buildKeyboardHandlers();
  renderAll();
}

// ══════════════ QUICK SCORES ══════════════

function buildQuickScores() {
  const container = document.getElementById('quick-scores');
  container.innerHTML = '';
  QUICK_SCORES.forEach((val, i) => {
    const btn = document.createElement('button');
    btn.className = 'qs-btn';
    btn.innerHTML = `<span class="qs-key">${FKEY_LABELS[i]}</span>${QUICK_LABELS[i]}`;
    btn.addEventListener('click', () => quickScore(val));
    container.appendChild(btn);
  });
}

function quickScore(val) {
  G.inputStr = String(val);
  updateDisplay();
  // Auto-enter
  setTimeout(() => enterScore(), 80);
}

// ══════════════ KEYBOARD ══════════════

function buildKeyboardHandlers() {
  document.removeEventListener('keydown', handleKey);
  document.addEventListener('keydown', handleKey);
}

function handleKey(e) {
  if (document.getElementById('stats-screen').style.display !== 'none') return;
  if (document.getElementById('leg-overlay').classList.contains('show')) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nextLeg(); }
    return;
  }
  const fIdx = ['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].indexOf(e.key);
  if (fIdx >= 0) { e.preventDefault(); quickScore(QUICK_SCORES[fIdx]); return; }
  if (e.key >= '0' && e.key <= '9') { numpadInput(e.key); return; }
  if (e.key === 'Backspace') { numpadDel(); return; }
  if (e.key === 'Enter') { enterScore(); return; }
}

// ══════════════ INPUT ══════════════

function toggleMode() {
  G.inputMode = G.inputMode === "score" ? "remaining" : "score";
  G.inputStr = "";
  updateDisplay();
  document.getElementById('mode-btn').textContent = G.inputMode === "score" ? "3-dart score" : "Remaining";
  document.getElementById('mode-btn').classList.toggle('active', G.inputMode === "remaining");
}

function numpadInput(digit) {
  if (G.inputStr.length >= 3) return;
  G.inputStr += digit;
  updateDisplay();
}

function numpadDel() {
  G.inputStr = G.inputStr.slice(0, -1);
  updateDisplay();
}

function updateDisplay() {
  const disp = document.getElementById('score-display');
  const val = parseInt(G.inputStr);
  const cur = G.scores[G.current];

  let txt = G.inputStr || "_";
  let invalid = false;

  if (G.inputStr !== "") {
    if (G.inputMode === "score") {
      // validate: 0-180, and result >= 0 (or exactly 0 for win)
      if (val > 180 || isNaN(val)) invalid = true;
      else if (cur - val < 0) invalid = true;
      else if (G.outRule === "double" && cur - val === 1) invalid = true;
    } else {
      // remaining: entered value is what's left
      if (val > cur || isNaN(val)) invalid = true;
      else if (G.outRule === "double" && val === 1) invalid = true;
    }
  }

  disp.textContent = txt;
  disp.classList.toggle('invalid', invalid);

  // Show remaining label
  const remLabel = document.getElementById('remaining-label');
  if (G.inputStr && !invalid && G.inputMode === "score") {
    const rem = cur - val;
    remLabel.textContent = rem >= 0 ? `→ ${rem}` : "";
  } else if (G.inputStr && !invalid && G.inputMode === "remaining") {
    const score = cur - val;
    remLabel.textContent = score >= 0 ? `scored ${score}` : "";
  } else {
    remLabel.textContent = "";
  }
}

function enterScore() {
  if (!G.inputStr) return;
  const val = parseInt(G.inputStr);
  if (isNaN(val)) return;

  const cur = G.scores[G.current];
  let score, remaining;

  if (G.inputMode === "score") {
    score = val;
    remaining = cur - val;
  } else {
    remaining = val;
    score = cur - val;
  }

  // Validation
  if (score < 0 || remaining < 0) return;
  if (score > 180) return;
  if (remaining === 1 && G.outRule === "double") return; // bust to 1

  // Bust check for double out
  let bust = false;
  if (G.outRule === "double") {
    if (remaining === 1) bust = true;
    if (remaining > 1 && remaining < 2 && remaining !== 0) bust = true;
  }

  // Was it a checkout attempt?
  const wasAttempt = cur <= 170 && !bust;

  // Apply
  const p = G.current;
  if (bust || remaining < 0) {
    // Bust — no change
    G.currentRound[p] = {score: 0, remain: cur, bust: true};
    G.dartsThrown[p] += 3;
    G.inputStr = "";
    updateDisplay();
    updateDots(3);
    setTimeout(() => { finishTurn(p, true); }, 300);
    return;
  }

  G.dartsThrown[p] += 3;
  G.totalScored[p] += score;
  G.scores[p] = remaining;

  // Stats
  const pName = p === 0 ? G.p1 : G.p2;
  const st = G.allStats[pName];
  st.darts += 3;
  st.scored += score;
  // First 9 darts average tracking (first 3 visits = 9 darts)
  if (G.dartsThrown[p] <= 9) {
    const dartsBefore = G.dartsThrown[p] - 3; // darts before this visit
    const dartsToCount = Math.min(3, 9 - dartsBefore);
    if (dartsToCount > 0) {
      const scoreToCount = Math.round(score * dartsToCount / 3);
      st.first9scored += scoreToCount;
      st.first9darts += dartsToCount;
    }
  }
  if (score >= 180) st.ton80++;
  else if (score >= 140) st.ton40++;
  else if (score >= 100) st.tons++;
  if (wasAttempt) st.attempts++;

  G.currentRound[p] = {score, remain: remaining};
  G.inputStr = "";
  updateDisplay();
  updateDots(3);

  if (remaining === 0) {
    // Checkout!
    if (wasAttempt) st.checkouts++;
    st.legs++;
    finishLeg(p, score);
  } else {
    setTimeout(() => finishTurn(p, false), 150);
  }
}

function finishTurn(p, bust) {
  // Log completed round when both players have gone or P2 just went
  if (p === 1 || (p === 0 && G.currentRound[1] === null)) {
    // Just switch
  }
  if (p === 0 && G.currentRound[1] === null) {
    // P1 done, wait for P2
    G.current = 1;
  } else if (p === 1) {
    // Both done, log round
    G.rounds.push({...G.currentRound});
    G.currentRound = {0: null, 1: null};
    addLogEntry(G.rounds.length);
    G.current = 0;
  } else if (p === 0) {
    G.current = 1;
  }
  G.dartsInRound = 0;
  updateDots(0);
  renderAll();
}

function finishLeg(winner, checkoutScore) {
  G.legs[winner]++;
  const pName = winner === 0 ? G.p1 : G.p2;
  const avg = G.dartsThrown[winner] > 0 ? (G.totalScored[winner] / G.dartsThrown[winner] * 3).toFixed(1) : "—";

  // Determine if a set or match was won
  let setWon = false;
  let matchWon = false;
  if (G.legs[winner] >= G.legsToWin) {
    if (G.setsToWin > 1) {
      setWon = true;
      G.sets[winner]++;
      if (G.sets[winner] >= G.setsToWin) matchWon = true;
      G.legs = [0, 0]; // reset legs for new set
    } else {
      matchWon = true;
    }
  }

  G.history.push({
    winner: pName,
    score: checkoutScore,
    p1avg: G.dartsThrown[0] > 0 ? (G.totalScored[0] / G.dartsThrown[0] * 3).toFixed(1) : "—",
    p2avg: G.dartsThrown[1] > 0 ? (G.totalScored[1] / G.dartsThrown[1] * 3).toFixed(1) : "—",
    legsAfter: [...G.legs],
    setsAfter: [...G.sets],
  });

  // Overlay
  const label = matchWon ? 'Match Win!' : (setWon ? 'Set Win!' : 'Checkout!');
  document.getElementById('ov-label').textContent = label;
  document.getElementById('ov-winner').textContent = pName;
  document.getElementById('ov-checkout').textContent = `Checked out ${checkoutScore}`;
  document.getElementById('ov-avg').textContent = `Leg avg: ${avg}`;

  const summary = G.setsToWin > 1
    ? `Sets ${G.sets[0]}–${G.sets[1]}  ·  Legs ${G.legs[0]}–${G.legs[1]}`
    : `Legs ${G.legs[0]}–${G.legs[1]}`;
  document.getElementById('ov-score-summary').textContent = summary;

  const nextBtn = document.getElementById('ov-next-btn');
  if (matchWon) {
    nextBtn.textContent = 'New Match';
    nextBtn.onclick = newGame;
  } else {
    nextBtn.textContent = setWon ? 'Next Set' : 'Next Leg';
    nextBtn.onclick = nextLeg;
  }

  document.getElementById('leg-overlay').classList.add('show');
  renderAll();
}

function nextLeg() {
  document.getElementById('leg-overlay').classList.remove('show');

  // Reset leg
  G.scores = [G.start, G.start];
  G.rounds = [];
  G.currentRound = {0: null, 1: null};
  G.dartsThrown = [0, 0];
  G.totalScored = [0, 0];
  G.inputStr = "";
  G.dartsInRound = 0;
  // Reset per-leg first9 counters on the allStats
  [G.p1, G.p2].forEach(n => { if (G.allStats[n]) { G.allStats[n].first9scored = 0; G.allStats[n].first9darts = 0; } });
  // Loser of leg starts next (alternate start: winner broke, loser starts)
  // Simple: alternate
  G.current = G.current === 0 ? 1 : 0;

  document.getElementById('game-log').innerHTML = `
    <div class="log-entry log-header">
      <span class="log-round">Round</span>
      <span id="log-h-p1">${G.p1}</span>
      <span class="log-p2" id="log-h-p2">${G.p2}</span>
    </div>`;

  updateDots(0);
  renderAll();
}

// ══════════════ RENDER ══════════════

function renderAll() {
  for (let p = 0; p < 2; p++) {
    const name = p === 0 ? G.p1 : G.p2;
    const rem = G.scores[p];
    document.getElementById(`name-${p}`).textContent = name;

    const scoreEl = document.getElementById(`score-${p}`);
    scoreEl.textContent = rem;

    const tagEl = document.getElementById(`tag-${p}`);
    scoreEl.className = 'player-score';
    tagEl.textContent = '';
    tagEl.className = 'score-tag';

    if (rem <= 170 && rem > 1 && !BOGEY_NUMBERS.has(rem)) {
      if (CHECKOUTS[rem]) {
        scoreEl.classList.add('score-finish');
        tagEl.textContent = 'Finish';
        tagEl.classList.add('tag-finish');
      }
    } else if (BOGEY_NUMBERS.has(rem)) {
      scoreEl.classList.add('score-bogey');
      tagEl.textContent = 'Bogey';
      tagEl.classList.add('tag-bogey');
    } else if (rem > 170 && rem <= 200) {
      scoreEl.classList.add('score-caution');
    }

    // Mini stats
    const st = G.allStats[name];
    const avg = st.darts > 0 ? (st.scored / st.darts * 3).toFixed(1) : "—";
    document.getElementById(`avg-${p}`).textContent = `avg ${avg}`;
    const legsText = G.setsToWin > 1
      ? `sets ${G.sets[p]}  legs ${G.legs[p]}`
      : `legs ${G.legs[p]}`;
    document.getElementById(`legs-${p}`).textContent = legsText;

    // Active board
    document.getElementById(`board-${p}`).classList.toggle('active', G.current === p);
  }

  // Checkout hint for active player
  const activeRem = G.scores[G.current];
  const hintEl = document.getElementById('checkout-hint');
  const textEl = document.getElementById('checkout-text');

  if (activeRem <= 170 && activeRem >= 2 && CHECKOUTS[activeRem] && !BOGEY_NUMBERS.has(activeRem)) {
    const opts = CHECKOUTS[activeRem].slice(0, 1);
    textEl.textContent = opts[0];
    hintEl.classList.remove('hidden');
  } else {
    hintEl.classList.add('hidden');
  }
}

function updateDots(filled) {
  for (let i = 0; i < 3; i++) {
    document.getElementById(`dot-${i}`).classList.toggle('filled', i < filled);
  }
}

function addLogEntry(round) {
  const log = document.getElementById('game-log');
  const r = G.rounds[round - 1];
  if (!r) return;

  const p0 = r[0] || {score: "—", remain: G.scores[0]};
  const p1 = r[1] || {score: "—", remain: G.scores[1]};

  const bustMark = (e) => e && e.bust ? " B" : "";

  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-round">${round}</span>
    <span class="log-score">${p0.score}${bustMark(r[0])} <span class="log-remain">${p0.remain}</span></span>
    <span class="log-score log-p2">${p1.score}${bustMark(r[1])} <span class="log-remain">${p1.remain}</span></span>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ══════════════ UNDO ══════════════

function undoLast() {
  // Simple: undo last entered turn
  if (G.currentRound[0] !== null && G.currentRound[1] === null && G.current === 1) {
    // P1 has gone, P2 hasn't — undo P1's turn
    const p0data = G.currentRound[0];
    G.scores[0] += p0data.score || 0;
    G.dartsThrown[0] -= 3;
    G.totalScored[0] -= p0data.score || 0;
    const name = G.p1;
    const st = G.allStats[name];
    st.darts -= 3;
    st.scored -= p0data.score || 0;
    G.currentRound[0] = null;
    G.current = 0;
    G.inputStr = "";
    renderAll();
  } else if (G.rounds.length > 0) {
    const last = G.rounds.pop();
    // Undo P2
    const p1data = last[1];
    if (p1data) {
      G.scores[1] = p1data.remain + (p1data.score || 0);
      G.dartsThrown[1] -= 3;
      G.totalScored[1] -= p1data.score || 0;
      const st = G.allStats[G.p2];
      st.darts -= 3;
      st.scored -= p1data.score || 0;
    }
    // Undo P1
    const p0data = last[0];
    if (p0data) {
      G.scores[0] = p0data.remain + (p0data.score || 0);
      G.dartsThrown[0] -= 3;
      G.totalScored[0] -= p0data.score || 0;
      const st = G.allStats[G.p1];
      st.darts -= 3;
      st.scored -= p0data.score || 0;
    }
    G.currentRound = {0: null, 1: null};
    G.current = 0;
    G.inputStr = "";
    // Remove last log entry
    const log = document.getElementById('game-log');
    const entries = log.querySelectorAll('.log-entry:not(.log-header)');
    if (entries.length > 0) entries[entries.length - 1].remove();
    renderAll();
  }
  updateDisplay();
}

// ══════════════ STATS SCREEN ══════════════

function showStats() {
  document.getElementById('leg-overlay').classList.remove('show');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('stats-screen').style.display = 'flex';
  renderStats();
}

function hideStats() {
  document.getElementById('stats-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
}

function renderStats() {
  const body = document.getElementById('stats-body');
  body.innerHTML = '';

  [G.p1, G.p2].forEach(name => {
    const st = G.allStats[name];
    if (!st) return;
    const avg = st.darts > 0 ? (st.scored / st.darts * 3).toFixed(2) : "—";
    const co = st.attempts > 0 ? ((st.checkouts / st.attempts) * 100).toFixed(1) + "%" : "—";
    const f9 = st.first9darts >= 9 ? (st.first9scored / st.first9darts * 3).toFixed(2) : (st.first9darts > 0 ? (st.first9scored / st.first9darts * 3).toFixed(2) + "*" : "—");

    const sec = document.createElement('div');
    sec.className = 'stats-player-section';
    sec.innerHTML = `
      <div class="stats-player-name">${name}</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-label">3-dart avg</div><div class="stat-value">${avg}</div></div>
        <div class="stat-item"><div class="stat-label">First 9 avg</div><div class="stat-value">${f9}</div></div>
        <div class="stat-item"><div class="stat-label">Checkout %</div><div class="stat-value">${co}</div></div>
        <div class="stat-item"><div class="stat-label">Legs won</div><div class="stat-value">${st.legs}</div></div>
        <div class="stat-item"><div class="stat-label">180s</div><div class="stat-value">${st.ton80}</div></div>
        <div class="stat-item"><div class="stat-label">140+ tons</div><div class="stat-value">${st.ton40}</div></div>
        <div class="stat-item"><div class="stat-label">100+ tons</div><div class="stat-value">${st.tons}</div></div>
      </div>`;
    body.appendChild(sec);
  });

  // History
  if (G.history.length > 0) {
    const hist = document.createElement('div');
    hist.className = 'history-section';
    hist.innerHTML = '<div class="history-title">Leg History</div><div class="history-list" id="hist-list"></div>';
    body.appendChild(hist);
    const list = hist.querySelector('#hist-list');
    G.history.forEach((h, i) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<span class="history-winner">Leg ${i+1}: ${h.winner} (${h.score})</span>
        <span class="history-score">${G.p1} ${h.p1avg} / ${G.p2} ${h.p2avg}</span>`;
      list.appendChild(div);
    });
  }
}

// ══════════════ NEW GAME ══════════════

function newGame() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// Init display
updateDisplay();
</script>
